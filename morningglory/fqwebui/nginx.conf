server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    client_max_body_size 200M;
    client_body_buffer_size 10M;

    # Docker 内部 DNS：避免上游容器重建后 IP 变更导致 502
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $fq_apiserver http://fq_apiserver:5000;
    set $fq_qawebserver http://fq_qawebserver:8010;

    # 静态文件服务
    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/  /index.html;
        index  index.html index.htm;
    }

    # API服务器配置
    location /api/ {
        proxy_pass $fq_apiserver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # QUANTAXIS WebServer配置 - 统一处理所有/api/qa/路径
    location ~* ^/api/qa/ {
        # 去除/api/qa前缀，将请求转发到qawebserver
        rewrite ^/api/qa/(.*) /$1 break;
        proxy_pass $fq_qawebserver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket连接特殊处理
    location ~* ^/api/qa/command/runws {
        rewrite ^/api/qa/(.*) /$1 break;
        proxy_pass $fq_qawebserver;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # WebSocket连接
    location /ws/ {
        proxy_pass $fq_apiserver;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # 错误页面
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
