telemetry:
  enabled: false

storage:
  sqlite:
    base_dir: /opt/dagster/storage
run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher
run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    dequeue_use_threads: true
    dequeue_num_workers: 8
    max_concurrent_runs: 100
    tag_concurrency_limits:
      - key: "dagster/backfill"
        limit: 10
compute_logs:
  module: dagster.core.storage.local_compute_log_manager
  class: LocalComputeLogManager
  config:
    base_dir: /opt/dagster/logs
local_artifact_storage:
  module: dagster.core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: /opt/dagster/artifact
code_servers:
  local_startup_timeout: 120
retention:
  schedule:
    purge_after_days: 30
  sensor:
    purge_after_days:
      skipped: 7
      failure: 30
      success: 30
sensors:
  use_threads: true
  num_workers: 8
schedules:
  use_threads: true
  num_workers: 8
run_retries:
  enabled: true
  max_retries: 10
run_monitoring:
  enabled: true
  start_timeout_seconds: 1800
  cancel_timeout_seconds: 1800
  max_resume_run_attempts: 0
  poll_interval_seconds: 120
  max_runtime_seconds: 18000
