mongodb:
  host: 127.0.0.1
  port: 27017
  db: freshquant
  gantt_db: freshquant_gantt

order_management:
  mongo_database: freshquant_order_management
  projection_database: freshquant
  external_confirm_seconds: 120
  guardian_allocation_policy: guardian_compat_low_price_first

redis:
  host: 127.0.0.1
  port: 6379
  db: 1

proxy:
  host: 127.0.0.1
  port: 10809

api:
  # API 服务地址，用于 Docker 容器访问宿主机服务
  # 支持环境变量: freshquant_API__BASE_URL
  base_url: http://host.docker.internal

output:
  dir: E:\freshquant_data

custom:
  enabled: false
  data:
    dir: E:\freshquant_data

signals:
  - name: 上涨回拉中枢
    description: 股价上涨回到上一个下跌中枢的中枢低点
  - name: 上涨五浪V反
    description: 前面是没有中枢的5笔的下跌，然后股价上涨突破最后下跌那笔的笔高点
  - name: 上涨V反
    description: 前面是带中枢的下跌，并且有3卖，然后股价上涨突破3卖那根K线的最高价
  - name: 上涨线段破坏
    description: 股价上涨形成新的线段，破坏前一个下跌线段
  - name: 上涨突破中枢
    description: 股价上涨突破中枢高高点
  - name: 下跌回拉中枢
    description: 股价下跌回到最后一个上涨中枢的中枢高点
  - name: 下跌五浪V反
    description: 前面是没有中枢的5笔上涨，然后股价下跌跌破最后上涨那笔的笔低点
  - name: 下跌V反
    description: 前面是带中枢的上涨，并且有3买，然后股价下跌跌破3买那根K线的最低价
  - name: 下跌线段破坏
    description: 股价下跌形成新的线段，破坏前一个上涨线段
  - name: 下跌突破中枢
    description: 股价下跌跌破中枢低低点

