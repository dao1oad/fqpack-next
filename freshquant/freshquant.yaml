  pools:
    - name: 日线上涨线段_30m下跌线段_5m中枢突破
      cond:
        线段形态_1d: 上涨
        线段形态_30m: 下跌
        缠论形态_5m: 上涨突破中枢
    - name: 日线完备
      cond:
        缠论形态_1d: 上涨线段破坏
        $or:
          - 缠论形态_5m: 上涨回拉中枢
          - 缠论形态_30m: 上涨回拉中枢
          - $and:
              - 线段形态_30m: 下跌
              - 缠论形态_5m: 上涨突破中枢
    - name: 1d上涨回拉中枢+30m上涨线段破坏+5m上涨突破中枢
      cond:
        缠论形态_1d: 上涨回拉中枢
        $and:
          - 缠论形态_5m: 上涨突破中枢
          - 缠论形态_30m: 上涨线段破坏
        离A0中枢高比率_1d:
          $lt: 1.0
        离A0段高比率_1d:
          $lt: 0.9
    - name: 1d上涨回拉中枢+30m上涨线段破坏+5m上涨回拉中枢
      cond:
        缠论形态_1d: 上涨回拉中枢
        缠论形态_30m: 上涨线段破坏
        缠论形态_5m: 上涨回拉中枢
        离A0中枢高比率_1d:
          $lt: 1.0
        离A0段高比率_1d:
          $lt: 0.9
