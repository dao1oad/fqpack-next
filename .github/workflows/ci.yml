name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-current-guard:
    name: docs-current-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref || 'main' }} --no-tags --prune

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Current docs guard
        run: uv run python script/ci/check_current_docs.py --base-ref origin/${{ github.base_ref || 'main' }} --head-ref HEAD

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref || 'main' }} --no-tags --prune

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Run pre-commit (PR diff only)
        run: uv tool run pre-commit run --show-diff-on-failure --color=always --from-ref origin/${{ github.base_ref || 'main' }} --to-ref HEAD

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Run pytest (unit tests only)
        run: uv run pytest -q freshquant/tests
