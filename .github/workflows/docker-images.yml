name: Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: publish-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rear
            image_name: fqnext-rear
            context: .
            dockerfile: ./docker/Dockerfile.rear
          - name: webui
            image_name: fqnext-webui
            context: ./morningglory/fqwebui
            dockerfile: ./docker/Dockerfile.web
          - name: ta-backend
            image_name: fqnext-ta-backend
            context: ./third_party/tradingagents-cn
            dockerfile: ./third_party/tradingagents-cn/Dockerfile.backend
          - name: ta-frontend
            image_name: fqnext-ta-frontend
            context: ./third_party/tradingagents-cn
            dockerfile: ./third_party/tradingagents-cn/Dockerfile.frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        shell: bash
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            FQ_IMAGE_GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:main
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
