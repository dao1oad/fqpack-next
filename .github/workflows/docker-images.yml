name: Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-publish-plan:
    name: resolve-publish-plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.publish-plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve publish SHAs
        id: publish-shas
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "bootstrap=false" >> "$GITHUB_OUTPUT"
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrap=true" >> "$GITHUB_OUTPUT"
          fi
          echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve publish plan
        id: publish-plan
        shell: bash
        run: |
          if [ "${{ steps.publish-shas.outputs.bootstrap }}" = "true" ]; then
            python script/ci/resolve_docker_image_publish_plan.py --repo-root . --head-sha "${{ steps.publish-shas.outputs.head_sha }}" --bootstrap > publish-plan.json
          else
            python script/ci/resolve_docker_image_publish_plan.py --repo-root . --base-sha "${{ steps.publish-shas.outputs.base_sha }}" --head-sha "${{ steps.publish-shas.outputs.head_sha }}" > publish-plan.json
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("publish-plan.json").read_text(encoding="utf-8"))
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps(payload['matrix'])}\n")
          PY

  publish:
    name: publish-${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: resolve-publish-plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-publish-plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        shell: bash
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: ${{ matrix.action == 'build' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            FQ_IMAGE_GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:main
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Retag unchanged image
        if: ${{ matrix.action == 'retag' }}
        shell: bash
        run: |
          source_image="ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:main"
          sha_image="ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:${{ github.sha }}"

          docker buildx imagetools inspect "$source_image" > /dev/null
          docker buildx imagetools create -t "$sha_image" -t "$source_image" "$source_image"
