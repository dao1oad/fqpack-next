name: Deploy Production

on:
  workflow_run:
    workflows: ["Docker Images"]
    types: [completed]

permissions:
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: [self-hosted, windows, production]
    steps:
      - name: Validate main tip freshness
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "fqpack-deploy-production"
          }
          $branch = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/branches/main" `
            -Headers $headers `
            -Method Get
          $currentMain = $branch.commit.sha
          $targetSha = "${{ github.event.workflow_run.head_sha }}"
          if ($currentMain -ne $targetSha) {
            throw "stale main deploy trigger: workflow_run.head_sha=$targetSha current_main=$currentMain"
          }

      - name: Download target revision archive
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "fqpack-deploy-production"
          }
          $targetSha = "${{ github.event.workflow_run.head_sha }}"
          $archiveUrl = "https://api.github.com/repos/${{ github.repository }}/zipball/$targetSha"
          $archivePath = Join-Path $env:RUNNER_TEMP "deploy-target.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "deploy-target"

          if (Test-Path $archivePath) {
            Remove-Item -Force $archivePath
          }
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }
          Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Force | Remove-Item -Recurse -Force

          Invoke-WebRequest `
            -Uri $archiveUrl `
            -Headers $headers `
            -OutFile $archivePath `
            -MaximumRedirection 5
          Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force

          $sourceRoot = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
          if (-not $sourceRoot) {
            throw "downloaded archive did not contain a source directory"
          }

          Get-ChildItem -LiteralPath $sourceRoot.FullName -Force | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $env:GITHUB_WORKSPACE -Recurse -Force
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        shell: powershell
        run: python -m pip install --upgrade pip uv

      - name: Sync locked environment
        shell: powershell
        run: uv sync --frozen

      - name: Run formal production deploy
        shell: powershell
        run: >
          py -3.12 script/ci/run_formal_deploy.py
          --repo-root .
          --head-sha "${{ github.event.workflow_run.head_sha }}"
          --run-url "${{ github.event.workflow_run.html_url }}"
          --format summary
