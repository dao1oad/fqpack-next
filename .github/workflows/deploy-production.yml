name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, windows, production]
    env:
      FQ_DEPLOY_CANONICAL_REPO_ROOT: D:\fqpack\freshquant-2026.2.23
      FQ_DEPLOY_MIRROR_ROOT: D:\fqpack\freshquant-2026.2.23\.worktrees\main-deploy-production
      FQ_DEPLOY_MIRROR_BRANCH: "deploy-production-main"
      FQ_DOCKER_FORCE_LOCAL_BUILD: "1"
    steps:
      - name: Run production deploy entrypoint
        working-directory: ${{ env.FQ_DEPLOY_CANONICAL_REPO_ROOT }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          $entrypoint = Join-Path $env:FQ_DEPLOY_CANONICAL_REPO_ROOT 'script/ci/run_production_deploy.ps1'
          if (-not (Test-Path $entrypoint)) {
            throw "production deploy entrypoint not found: $entrypoint"
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File $entrypoint `
            -CanonicalRoot $env:FQ_DEPLOY_CANONICAL_REPO_ROOT `
            -MirrorRoot $env:FQ_DEPLOY_MIRROR_ROOT `
            -MirrorBranch $env:FQ_DEPLOY_MIRROR_BRANCH `
            -TargetSha "${{ github.sha }}" `
            -GitHubRepository "${{ github.repository }}" `
            -RunUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" `
            -Verbose
