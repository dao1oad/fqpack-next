name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, windows, production]
    env:
      FQ_DEPLOY_MIRROR_ROOT: D:\fqpack\freshquant-2026.2.23
      FQ_DOCKER_FORCE_LOCAL_BUILD: "1"
    steps:
      - name: Validate main tip freshness
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "fqpack-deploy-production"
          }
          $branch = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/branches/main" `
            -Headers $headers `
            -Method Get
          $currentMain = $branch.commit.sha
          $targetSha = "${{ github.sha }}"
          if ($currentMain -ne $targetSha) {
            throw "stale push deploy trigger: github.sha=$targetSha current_main=$currentMain"
          }

      - name: Sync local deploy mirror
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          $mirrorRoot = $env:FQ_DEPLOY_MIRROR_ROOT
          $targetSha = "${{ github.sha }}"
          $remoteUrl = "https://github.com/${{ github.repository }}.git"

          if (-not (Test-Path $mirrorRoot)) {
            throw "deploy mirror root does not exist: $mirrorRoot"
          }

          $syncScript = Join-Path $mirrorRoot "script\ci\sync_local_deploy_mirror.py"
          if (Test-Path $syncScript) {
            py -3.12 $syncScript `
              --repo-root $mirrorRoot `
              --target-sha $targetSha `
              --remote-url $remoteUrl `
              --branch main `
              --format summary
            if ($LASTEXITCODE -ne 0) {
              throw "local deploy mirror sync script failed"
            }
          } else {
            $dirty = (& git -C $mirrorRoot status --porcelain).Trim()
            if ($LASTEXITCODE -ne 0) {
              throw "failed to inspect deploy mirror git status"
            }
            if ($dirty) {
              throw "deploy mirror has a dirty working tree: $mirrorRoot"
            }

            & git -C $mirrorRoot fetch $remoteUrl refs/heads/main:refs/remotes/origin/main
            if ($LASTEXITCODE -ne 0) {
              throw "failed to fetch remote main into deploy mirror"
            }

            $originMainSha = (& git -C $mirrorRoot rev-parse refs/remotes/origin/main).Trim()
            if ($LASTEXITCODE -ne 0) {
              throw "failed to resolve origin/main after fetch"
            }
            if ($originMainSha -ne $targetSha) {
              throw "origin/main does not match target sha: origin/main=$originMainSha target=$targetSha"
            }

            & git -C $mirrorRoot checkout main
            if ($LASTEXITCODE -ne 0) {
              throw "failed to checkout deploy mirror main"
            }
            & git -C $mirrorRoot merge --ff-only refs/remotes/origin/main
            if ($LASTEXITCODE -ne 0) {
              throw "failed to fast-forward main"
            }

            $headSha = (& git -C $mirrorRoot rev-parse HEAD).Trim()
            if ($LASTEXITCODE -ne 0) {
              throw "failed to resolve deploy mirror HEAD after sync"
            }
            if ($headSha -ne $targetSha) {
              throw "deploy mirror head does not match target sha after sync: head=$headSha target=$targetSha"
            }
          }

      - name: Validate local Python toolchain
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          py -3.12 --version
          if ($LASTEXITCODE -ne 0) {
            throw "py -3.12 is not available on the production runner"
          }
          py -3.12 -m uv --version
          if ($LASTEXITCODE -ne 0) {
            throw "uv is not available in the production runner Python 3.12 environment"
          }

      - name: Sync locked environment
        working-directory: ${{ env.FQ_DEPLOY_MIRROR_ROOT }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          py -3.12 -m uv sync --frozen

      - name: Run formal production deploy
        working-directory: ${{ env.FQ_DEPLOY_MIRROR_ROOT }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          py -3.12 script/ci/run_formal_deploy.py `
            --repo-root . `
            --head-sha "${{ github.sha }}" `
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" `
            --format summary
