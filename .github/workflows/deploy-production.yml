name: Deploy Production

on:
  workflow_run:
    workflows: ["Docker Images"]
    types: [completed]

permissions:
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: [self-hosted, windows, production]
    steps:
      - name: Validate main tip freshness
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "fqpack-deploy-production"
          }
          $branch = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/branches/main" `
            -Headers $headers `
            -Method Get
          $currentMain = $branch.commit.sha
          $targetSha = "${{ github.event.workflow_run.head_sha }}"
          if ($currentMain -ne $targetSha) {
            throw "stale main deploy trigger: workflow_run.head_sha=$targetSha current_main=$currentMain"
          }

      - name: Download target revision archive
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $targetSha = "${{ github.event.workflow_run.head_sha }}"
          $archiveUrl = "https://api.github.com/repos/${{ github.repository }}/zipball/$targetSha"
          $archivePath = Join-Path $env:RUNNER_TEMP "deploy-target.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "deploy-target"

          if (Test-Path $archivePath) {
            Remove-Item -Force $archivePath
          }
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }
          Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Force | Remove-Item -Recurse -Force

          $codeloadIp = $null
          for ($attempt = 1; $attempt -le 3 -and -not $codeloadIp; $attempt++) {
            try {
              $codeloadIp = Resolve-DnsName codeload.github.com -Type A -ErrorAction Stop |
                Where-Object { $_.IPAddress } |
                Select-Object -First 1 -ExpandProperty IPAddress
            } catch {
              if ($attempt -ge 3) {
                throw
              }
              Start-Sleep -Seconds (2 * $attempt)
            }
          }
          if (-not $codeloadIp) {
            throw "failed to resolve codeload.github.com for deploy archive download"
          }

          $curlArgs = @(
            "--location",
            "--fail",
            "--silent",
            "--show-error",
            "--http1.1",
            "--retry", "5",
            "--retry-all-errors",
            "--retry-delay", "3",
            "--connect-timeout", "30",
            "--max-time", "600",
            "--resolve", "codeload.github.com:443:$codeloadIp",
            "-H", "Authorization: Bearer $env:GH_TOKEN",
            "-H", "Accept: application/vnd.github+json",
            "-H", "X-GitHub-Api-Version: 2022-11-28",
            "-H", "User-Agent: fqpack-deploy-production",
            "--output", $archivePath,
            $archiveUrl
          )
          & curl.exe @curlArgs
          if ($LASTEXITCODE -ne 0) {
            throw "curl archive download failed with exit code $LASTEXITCODE"
          }
          Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force

          $sourceRoot = Get-ChildItem -Path $extractRoot -Directory | Select-Object -First 1
          if (-not $sourceRoot) {
            throw "downloaded archive did not contain a source directory"
          }

          Get-ChildItem -LiteralPath $sourceRoot.FullName -Force | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $env:GITHUB_WORKSPACE -Recurse -Force
          }

      - name: Install uv
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          py -3.12 -m pip install --upgrade pip uv

      - name: Sync locked environment
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          py -3.12 -m uv sync --frozen

      - name: Run formal production deploy
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          py -3.12 script/ci/run_formal_deploy.py `
            --repo-root . `
            --head-sha "${{ github.event.workflow_run.head_sha }}" `
            --run-url "${{ github.event.workflow_run.html_url }}" `
            --github-repository "${{ github.repository }}" `
            --format summary
