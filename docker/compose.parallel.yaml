name: fqnext_20260223

services:
  fq_mongodb:
    image: mongo:8.2.2
    environment:
      TZ: Asia/Shanghai
    ports:
      - "27027:27017"
    volumes:
      - fqnext_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  fq_redis:
    image: redis:7.0.12-alpine3.18
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - fqnext_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  fq_apiserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rear
      args:
        FQ_IMAGE_GIT_SHA: ${FQ_IMAGE_GIT_SHA:-unknown}
    image: ${FQNEXT_REAR_IMAGE:-fqnext_rear:2026.2.23}
    env_file:
      - ${FQ_COMPOSE_ENV_FILE:?Set FQ_COMPOSE_ENV_FILE to the primary worktree .env}
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      FQ_RUNTIME_LOG_DIR: /freshquant/logs/runtime
      FRESHQUANT_MONGODB__HOST: fq_mongodb
      FRESHQUANT_MONGODB__PORT: "27017"
      MONGODB: fq_mongodb
      MONGODB_PORT: "27017"
    command: ["/freshquant/.venv/bin/python", "-m", "freshquant.rear.api_server", "--port", "5000"]
    ports:
      - "15000:5000"
    volumes:
      - ${FQ_RUNTIME_LOG_HOST_DIR:?Set FQ_RUNTIME_LOG_HOST_DIR to the host runtime log directory}:/freshquant/logs/runtime
      - type: bind
        source: ${FQPACK_TDX_SYNC_DIR:-D:/tdx_biduan}
        target: /opt/tdx
    depends_on:
      fq_mongodb:
        condition: service_healthy
      fq_redis:
        condition: service_healthy
    restart: unless-stopped

  fq_tdxhq:
    image: ${FQNEXT_REAR_IMAGE:-fqnext_rear:2026.2.23}
    env_file:
      - ${FQ_COMPOSE_ENV_FILE:?Set FQ_COMPOSE_ENV_FILE to the primary worktree .env}
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      FRESHQUANT_MONGODB__HOST: fq_mongodb
      FRESHQUANT_MONGODB__PORT: "27017"
      MONGODB: fq_mongodb
      MONGODB_PORT: "27017"
    command: ["/freshquant/.venv/bin/python", "-m", "freshquant.gateway.tdxhq", "--port", "5001"]
    ports:
      - "15001:5001"
    depends_on:
      fq_mongodb:
        condition: service_healthy
    restart: unless-stopped

  fq_dagster_webserver:
    image: ${FQNEXT_REAR_IMAGE:-fqnext_rear:2026.2.23}
    env_file:
      - ${FQ_COMPOSE_ENV_FILE:?Set FQ_COMPOSE_ENV_FILE to the primary worktree .env}
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      JYGS_ENV_FILE: /run/host-config/envs.conf
      FRESHQUANT_TDX_ROOT: /run/host-tdx
      FRESHQUANT_MONGODB__HOST: fq_mongodb
      FRESHQUANT_MONGODB__PORT: "27017"
      MONGODB: fq_mongodb
      MONGODB_PORT: "27017"
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /opt/dagster/home; cp -n /freshquant/morningglory/fqdagsterconfig/* /opt/dagster/home/; cd /opt/dagster/home; /freshquant/.venv/bin/dagster-webserver -h 0.0.0.0 -p 10003 -w /opt/dagster/home/workspace.yaml",
      ]
    ports:
      - "11003:10003"
    volumes:
      - fqnext_dagster_data:/opt/dagster
      - type: bind
        source: ${FQPACK_CONFIG_DIR:-D:/fqpack/config}
        target: /run/host-config
        read_only: true
      - type: bind
        source: ${FQPACK_TDX_DIR:-D:/new_tdx}
        target: /run/host-tdx
        read_only: true
    depends_on:
      fq_mongodb:
        condition: service_healthy
      fq_redis:
        condition: service_healthy
    restart: unless-stopped

  fq_dagster_daemon:
    image: ${FQNEXT_REAR_IMAGE:-fqnext_rear:2026.2.23}
    env_file:
      - ${FQ_COMPOSE_ENV_FILE:?Set FQ_COMPOSE_ENV_FILE to the primary worktree .env}
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      JYGS_ENV_FILE: /run/host-config/envs.conf
      FRESHQUANT_TDX_ROOT: /run/host-tdx
      FRESHQUANT_MONGODB__HOST: fq_mongodb
      FRESHQUANT_MONGODB__PORT: "27017"
      MONGODB: fq_mongodb
      MONGODB_PORT: "27017"
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /opt/dagster/home; cp -n /freshquant/morningglory/fqdagsterconfig/* /opt/dagster/home/; /freshquant/.venv/bin/dagster-daemon run -w /opt/dagster/home/workspace.yaml",
      ]
    volumes:
      - fqnext_dagster_data:/opt/dagster
      - type: bind
        source: ${FQPACK_CONFIG_DIR:-D:/fqpack/config}
        target: /run/host-config
        read_only: true
      - type: bind
        source: ${FQPACK_TDX_DIR:-D:/new_tdx}
        target: /run/host-tdx
        read_only: true
    depends_on:
      fq_mongodb:
        condition: service_healthy
      fq_redis:
        condition: service_healthy
    restart: unless-stopped

  fq_qawebserver:
    image: ${FQNEXT_REAR_IMAGE:-fqnext_rear:2026.2.23}
    env_file:
      - ${FQ_COMPOSE_ENV_FILE:?Set FQ_COMPOSE_ENV_FILE to the primary worktree .env}
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      FRESHQUANT_MONGODB__HOST: fq_mongodb
      FRESHQUANT_MONGODB__PORT: "27017"
      MONGODB: fq_mongodb
      MONGODB_PORT: "27017"
    command: ["/freshquant/.venv/bin/python", "-m", "QUANTAXIS.QAWebServer.server"]
    ports:
      - "18010:8010"
    depends_on:
      fq_mongodb:
        condition: service_healthy
    restart: unless-stopped

  fq_webui:
    build:
      context: ../morningglory/fqwebui
      dockerfile: ../../docker/Dockerfile.web
      args:
        FQ_IMAGE_GIT_SHA: ${FQ_IMAGE_GIT_SHA:-unknown}
    image: ${FQNEXT_WEBUI_IMAGE:-fqnext_webui:2026.2.23}
    ports:
      - "18080:80"
    depends_on:
      fq_apiserver:
        condition: service_started
      fq_qawebserver:
        condition: service_started
    restart: unless-stopped

  ta_backend:
    build:
      context: ../third_party/tradingagents-cn
      dockerfile: Dockerfile.backend
    image: ${FQNEXT_TA_BACKEND_IMAGE:-fqnext_ta_backend:2026.2.23}
    env_file:
      - ${FQ_COMPOSE_ENV_FILE:?Set FQ_COMPOSE_ENV_FILE to the primary worktree .env}
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      DOCKER_CONTAINER: "true"
      MONGODB_ENABLED: "true"
      MONGODB_HOST: fq_mongodb
      MONGODB_PORT: "27017"
      MONGODB_USERNAME: ""
      MONGODB_PASSWORD: ""
      MONGODB_DATABASE: tradingagents_cn
      MONGODB_DATABASE_NAME: tradingagents_cn
      MONGODB_AUTH_SOURCE: admin
      MONGODB_URL: mongodb://fq_mongodb:27017/tradingagents_cn
      MONGO_URI: mongodb://fq_mongodb:27017/tradingagents_cn
      MONGODB_CONNECTION_STRING: mongodb://fq_mongodb:27017/tradingagents_cn
      USE_MONGODB_STORAGE: "true"
      REDIS_ENABLED: "true"
      REDIS_HOST: fq_redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "8"
      REDIS_URL: redis://fq_redis:6379/8
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TA_USE_APP_CACHE: "true"
      TRADINGAGENTS_LOG_DIR: /app/logs
      TRADINGAGENTS_LOG_FILE: /app/logs/tradingagents.log
      LOG_FILE: /app/logs/tradingagents.log
      TRADINGAGENTS_DATA_DIR: /app/data
      TRADINGAGENTS_CACHE_DIR: /app/data/cache
      TRADINGAGENTS_SESSIONS_DIR: /app/data/sessions
      TRADINGAGENTS_LOGS_DIR: /app/data/logs
      TRADINGAGENTS_CONFIG_DIR: /app/data/config
      TRADINGAGENTS_TEMP_DIR: /app/data/temp
      TRADINGAGENTS_RESULTS_DIR: /app/data/analysis_results
      ALLOWED_ORIGINS: '["http://localhost:13080","http://127.0.0.1:13080"]'
      ALLOWED_HOSTS: '["*"]'
      CONFIG_SOT: file
    command:
      - sh
      - -lc
      - >
        /app/.venv/bin/python -m app.scripts.bootstrap_reasoner_defaults &&
        /app/.venv/bin/python -c "import asyncio; from app.services.user_service import user_service; asyncio.run(user_service.create_admin_user()); user_service.close()" &&
        exec /app/.venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "13000:8000"
    volumes:
      - ../runtime/tradingagents-cn/data:/app/data
      - ../runtime/tradingagents-cn/logs:/app/logs
    depends_on:
      fq_mongodb:
        condition: service_healthy
      fq_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ta_frontend:
    build:
      context: ../third_party/tradingagents-cn
      dockerfile: Dockerfile.frontend
    image: ${FQNEXT_TA_FRONTEND_IMAGE:-fqnext_ta_frontend:2026.2.23}
    ports:
      - "13080:80"
    volumes:
      - ./tradingagents/frontend.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ta_backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  fqnext_mongodb_data:
  fqnext_redis_data:
  fqnext_dagster_data:
